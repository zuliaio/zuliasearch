name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Warmup: the first Gradle invocation after reckon is downloaded
      # computes a wrong snapshot version (`<next>-beta.0.0+<timestamp>`).
      # A second invocation stamps the correct release. Running `help` first
      # primes the daemon/plugin cache so the real build stamps the tag.
      - name: Warmup Gradle and reckon
        run: ./gradlew help -q

      - name: Verify release notes exist
        run: |
          NOTES="release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Missing $NOTES - commit a release notes file before tagging."
            exit 1
          fi
          echo "NOTES_PATH=$NOTES" >> "$GITHUB_ENV"

      # Must be a single Gradle invocation starting with `clean`. The
      # copySwagger task (finalizer of `build`) writes into the tracked
      # `zulia-swagger/ui/` path, which dirties the working tree. Any
      # subsequent Gradle invocation after `build` sees that dirt and
      # reckon falls back to `<next>-beta.0.0+<timestamp>` snapshot mode,
      # at which point signing is skipped and publish fails with
      # "no configured signatory". Combining clean + build + dist + publish
      # keeps reckon's single evaluation on a clean tree.
      - name: Build, sign, and publish
        run: |
          ./gradlew clean build \
            :zulia-server:distTar :zulia-tools:distTar \
            publishAllPublicationsToMavenCentralRepository \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zulia ${{ github.ref_name }}
          body_path: ${{ env.NOTES_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            zulia-server/build/distributions/*.tar
            zulia-tools/build/distributions/*.tar
            zulia-server/build/distributions/*.zip
            zulia-tools/build/distributions/*.zip
