name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify release notes exist
        run: |
          NOTES="release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Missing $NOTES - commit a release notes file before tagging."
            exit 1
          fi
          echo "NOTES_PATH=$NOTES" >> "$GITHUB_ENV"

      - name: Build and test
        run: ./gradlew clean build

      - name: Build distributions
        run: ./gradlew :zulia-server:distTar :zulia-tools:distTar

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zulia ${{ github.ref_name }}
          body_path: ${{ env.NOTES_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            zulia-server/build/distributions/*.tar
            zulia-tools/build/distributions/*.tar
