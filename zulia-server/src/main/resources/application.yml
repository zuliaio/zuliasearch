micronaut:
  http:
    client:
      max-content-length: 2147483647
  server:
    max-request-size: 10737418240
    port: 32192
    cors:
      enabled: true
    netty:
      log-level: TRACE
    multipart:
      max-file-size: 10737418240
      enabled: true
      mixed: false
  application:
    name: zulia-service
  health:
    monitor:
      enabled: false
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
      default:
        enabled: true
        mapping: "/**"
        paths: classpath:static
  serde:
    serialization:
      inclusion: NON_NULL
endpoints:
  routes:
    enabled: true
  stop:
    enabled: true
    sensitive: true
  health:
    enabled: true
    sensitive: false
    details-visible: anonymous
    disk-space:
      enabled: true
      threshold: 1073741824 # 1GB
