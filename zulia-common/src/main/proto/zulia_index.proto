syntax = "proto3";

import "zulia_base.proto";

option java_package = "io.zulia.message";

message IndexShardMapping {
    string indexName = 1;
    uint32 numberOfShards = 2;
    repeated ShardMapping shardMapping = 3;
}

message IndexAlias {
    string aliasName = 1;
    string indexName = 2; // kept for backward compat - first/only index
    repeated string indexNames = 3; // full list of indexes when alias is multi-index
    string writeIndex = 4; // designated write target; must be one of indexNames. empty means reject single-index writes for multi-index aliases
}

message ShardMapping {
    uint32 shardNumber = 1;
    Node primaryNode = 2;
    repeated Node replicaNode = 3;
}

message IndexSettings {
    string indexName = 1;
    uint32 numberOfShards = 2; // default 1
    uint32 numberOfReplicas = 3; // default 0

    //server populated
    int64 createTime = 4;
    int64 updateTime = 5;

    repeated string defaultSearchField = 6;
    repeated AnalyzerSettings analyzerSettings = 7;
    repeated FieldConfig fieldConfig = 8;

    double requestFactor = 9; // default 2.0
    uint32 minShardRequest = 10; //default 2
    double shardTolerance = 11; //default 0

    uint32 shardQueryCacheSize = 12; // default 512
    uint32 shardQueryCacheMaxAmount = 13; // default 256

    uint32 idleTimeWithoutCommit = 14; // default 5
    uint32 shardCommitInterval = 15; // default 3200

    uint32 indexWeight = 16; //default 1

    uint32 ramBufferMB = 17; //default 128

    bytes meta = 18;

    // index has list of query request objects stored a byte array instead of a message
    // this ensures a query message format change can be handled on serialization and just fail to load the query vs. the whole index
    // is also removes proto file dependencies between index and query
    repeated bytes warmingSearches = 19;

    uint32 commitToWarmTime = 20; // default 5

    repeated FieldMapping fieldMapping = 21;

    bool disableCompression = 22;

    uint32 defaultConcurrency = 23;

    string description = 24;

    int32 maxMergeThreads = 25; // default -1 (auto detect)
    int32 maxMergePending = 26; // default -1 (auto detect)
    uint32 indexingThrottle = 27; // default 1

    // NRT (near-real-time) RAM cache sizing for the index and taxonomy directories. 0 means use the default.
    uint32 nrtIndexMaxMergeSizeMB = 28; // default 50
    uint32 nrtIndexMaxCachedMB = 29; // default 150
    uint32 nrtTaxoMaxMergeSizeMB = 30; // default 5
    uint32 nrtTaxoMaxCachedMB = 31; // default 15
    bool nrtCachingDisabled = 32; // when true, no new segments are cached in RAM (directory stays wrapped so it can be toggled live)

    // server populated: the index-creation version, stamped once at create time and never changed (see ZuliaIndexVersion).
    // Lets new indexes adopt evolving built-in defaults (e.g. id-sort doc-values skip index, default vector quantization)
    // that cannot be expressed per field and must not change for an index that already exists. 0 means legacy (pre-versioning).
    uint32 createdIndexVersion = 33;
}


message UpdateIndexSettings {
    message Operation {
        enum OperationType {
            MERGE = 0;
            REPLACE = 1;
        }
        bool enable = 1;
        OperationType operationType = 2;
        repeated string removedKeys = 3;
    }

    bool setDefaultSearchField = 1;
    repeated string defaultSearchField = 2;

    repeated AnalyzerSettings analyzerSettings = 3;
    Operation analyzerSettingsOperation = 4; // keyed by name

    repeated FieldConfig fieldConfig = 5;
    Operation fieldConfigOperation = 6; // keyed by storedFieldName

    bool setRequestFactor = 7;
    double requestFactor = 8;

    bool setMinShardRequest = 9;
    uint32 minShardRequest = 10;

    bool setShardTolerance = 11;
    double shardTolerance = 12;

    bool setShardQueryCacheSize = 13;
    uint32 shardQueryCacheSize = 14;

    bool setShardQueryCacheMaxAmount = 15;
    uint32 shardQueryCacheMaxAmount = 16;

    bool setIdleTimeWithoutCommit = 17;
    uint32 idleTimeWithoutCommit = 18;

    bool setShardCommitInterval = 19;
    uint32 shardCommitInterval = 20;

    bool setIndexWeight = 21;
    uint32 indexWeight = 22;

    bool setRamBufferMB = 23;
    uint32 ramBufferMB = 24;

    Operation metaUpdateOperation = 25;
    bytes metadata = 26;

    Operation warmingSearchesOperation = 27;
    repeated bytes warmingSearches = 28;

    repeated FieldMapping fieldMapping = 29;
    Operation fieldMappingOperation = 30; // keyed by alias

    bool setDisableCompression = 31;
    bool disableCompression = 32;

    bool setDefaultConcurrency = 33;
    uint32 defaultConcurrency = 34;

    bool setDescription = 35;
    string description = 36;

    bool setMaxMergeThreads = 37;
    int32 maxMergeThreads = 38;

    bool setMaxMergePending = 39;
    int32 maxMergePending = 40;

    bool setIndexingThrottle = 41;
    uint32 indexingThrottle = 42;

    bool setNrtIndexMaxMergeSizeMB = 43;
    uint32 nrtIndexMaxMergeSizeMB = 44;

    bool setNrtIndexMaxCachedMB = 45;
    uint32 nrtIndexMaxCachedMB = 46;

    bool setNrtTaxoMaxMergeSizeMB = 47;
    uint32 nrtTaxoMaxMergeSizeMB = 48;

    bool setNrtTaxoMaxCachedMB = 49;
    uint32 nrtTaxoMaxCachedMB = 50;

    bool setNrtCachingDisabled = 51;
    bool nrtCachingDisabled = 52;

    bool setNumberOfReplicas = 53;
    uint32 numberOfReplicas = 54;

}



message FieldConfig {

    reserved 6; //old projectAs

    enum FieldType {
        STRING = 0;
        NUMERIC_INT = 1;
        NUMERIC_LONG = 2;
        NUMERIC_FLOAT = 3;
        NUMERIC_DOUBLE = 4;
        DATE = 5;
        BOOL = 6;
        UNIT_VECTOR = 7;
        VECTOR = 8;
        GEO_POINT = 9;
    }

    FieldType fieldType = 1;
    string storedFieldName = 2;
    repeated IndexAs indexAs = 3;
    repeated FacetAs facetAs = 4;
    repeated SortAs sortAs = 5;
    string displayName = 7;
    string description = 8;
    GeoPointConfig geoPointConfig = 9;
    // Build a Lucene doc-values skip index on this field's sort doc-values (enables block-skipping range queries and dynamic-pruning sorts).
    // optional so we can tell "unset" (default on for new fields) apart from an explicit opt-out. Frozen once a field exists
    optional bool docValueSkipIndex = 10;
    VectorDescription vectorDescription = 11; // for VECTOR / UNIT_VECTOR fields: dimensions, similarity, model provenance
}

message GeoPointConfig {
    string latitudeKey = 1;   // default "latitude"
    string longitudeKey = 2;  // default "longitude"
}

// Properties of the vector data itself, shared by every indexed representation of the field.
// Per-representation indexing choices (quantization, HNSW) live in VectorIndexingConfig on each IndexAs.
message VectorDescription {
    enum Similarity {
        DEFAULT = 0;            // derive from field type (VECTOR=COSINE, UNIT_VECTOR=DOT_PRODUCT)
        COSINE = 1;
        DOT_PRODUCT = 2;
        EUCLIDEAN = 3;
        MAX_INNER_PRODUCT = 4;
    }

    Similarity similarity = 1;
    uint32 dimensions = 2;          // 0 = infer at index time. When set, vector length is validated on store

    // Provenance only. Records which embedding model produced these vectors. The server does not run inference
    string modelName = 3;           // e.g. "BAAI/bge-large-en-v1.5"
    string modelDescription = 4;    // optional free-text notes about the model/vectors
}

// How one indexed representation of a dense-vector field is encoded on disk. Lives on IndexAs, so one stored field
// indexed under multiple names can carry a different encoding per name. With no config the encoding resolves by
// createdIndexVersion (INT8 for new indexes, FLOAT32 for legacy).
message VectorIndexingConfig {
    enum Encoding {
        ENCODING_UNSPECIFIED = 0; // no explicit choice, the server applies the index-creation-version default
        FLOAT32 = 1;   // raw float32 HNSW (Lucene99HnswVectorsFormat). Explicit opt-out of quantization
        INT8 = 2;      // 8-bit scalar quant (UNSIGNED_BYTE)
        INT7 = 3;      // 7-bit scalar quant (SEVEN_BIT)
        INT4 = 4;      // 4-bit scalar quant (PACKED_NIBBLE)
        BBQ = 5;       // 1-bit Better Binary Quantization (SINGLE_BIT_QUERY_NIBBLE)
        BBQ_2BIT = 6;  // 2-bit binary quant (DIBIT_QUERY_NIBBLE)
    }

    enum IndexType {
        HNSW = 0;   // approximate nearest neighbor graph
        FLAT = 1;   // exact brute force (quantized flat)
    }

    Encoding encoding = 1;          // an explicit value (incl FLOAT32) is authoritative
    IndexType indexType = 2;
    uint32 hnswM = 3;               // 0 means 16
    uint32 hnswEfConstruction = 4;  // 0 means 100
}


message FieldMapping {
    string alias = 1;
    repeated string fieldOrFieldPattern = 2;
    bool includeSelf = 3;
}


message AnalyzerSettings {


    enum Tokenizer {
        STANDARD = 0;
        KEYWORD = 1;
        WHITESPACE = 2;
    }

    enum Filter {
        LOWERCASE = 0;
        UPPERCASE = 1;
        STOPWORDS = 2;
        ASCII_FOLDING = 3;
        KSTEM = 4;
        ENGLISH_MIN_STEM = 5;
        SNOWBALL_STEM = 6;
        ENGLISH_POSSESSIVE = 7;
        MINHASH = 8;
        TWO_TWO_SHINGLE = 9;
        THREE_THREE_SHINGLE = 10;
        FOUR_FOUR_SHINGLE = 11;
        FIVE_FIVE_SHINGLE = 12;
        BRITISH_US = 13;
        CONCAT_ALL = 14;
        CASE_PROTECTED_WORDS = 15;
        GERMAN_NORMALIZATION = 16;
    }


    string name = 1;
    Tokenizer tokenizer = 2; //STANDARD default
    repeated Filter filter = 3;
    Similarity similarity = 4; //BM25 default
    bool stripHTML = 5;
}


message IndexAs {
    string indexFieldName = 1;
    string analyzerName = 2;
    VectorIndexingConfig vectorIndexingConfig = 3; // for VECTOR / UNIT_VECTOR fields: quantization and HNSW graph for this representation
}

message Superbit {
    uint32 inputDim = 1;
    uint32 batches = 2; //default 1
    uint32 seed = 3; //default 1357
}

message FacetAs {
    enum DateHandling {
        DATE_YYYY_MM_DD = 0;
        DATE_YYYYMMDD = 1;
    }
    string facetName = 1;
    DateHandling dateHandling = 2;
    bool hierarchical = 3;
    repeated string facetGroups = 4;
    bool storeInOwnGroup = 5;
}

message SortAs {
    enum StringHandling {
        STANDARD = 0;
        LOWERCASE = 1;
        FOLDING = 2;
        LOWERCASE_FOLDING = 3;
    }

    string sortFieldName = 1;
    StringHandling stringHandling = 2;

}

