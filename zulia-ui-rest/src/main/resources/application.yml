micronaut:
  server:
    port: 32194
    cors:
      enabled: true
    context-path: /zuliauirest
  application:
    name: zulia-ui-rest-service
  endpoints:
    health:
      enabled: true
      sensitive: false
      details-visible: String
      status:
        http-mapping: Map<String, HttpStatus>
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              # No default: the app must fail fast if JWT_GENERATOR_SIGNATURE_SECRET is unset.
              # A committed fallback secret would let anyone forge admin tokens.
              secret: '"${JWT_GENERATOR_SIGNATURE_SECRET}"'
        generator:
          refresh-token:
            secret: '"${JWT_GENERATOR_SIGNATURE_SECRET}"'
            enabled: true
      generator:
        access-token:
          expiration: 3600 # in seconds which makes this a one hour access-token
        refresh-token:
          expiration: 3600
      bearer:
        enabled: true

# mongoDB info
mongodb:
  uri: mongodb://localhost:27017/retryWrites=false&retryReads=false
  auth-db:
    name: zuliaAuth
    collection: refreshTokens
  user-db:
    name: zuliaUsers
    collection: users
  package-names:
    - io.zulia.ui.rest.beans